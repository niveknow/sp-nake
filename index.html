<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermes Snake</title>
    <style>
        /* Center everything on the page — classic game layout */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        .game-wrapper {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(76, 175, 80, 0.2);
            text-align: center;
        }
        h1 {
            color: #4caf50;
            font-size: 24px;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        canvas {
            border: 2px solid #333;
            border-radius: 4px;
            display: block;
            margin: 0 auto;
            cursor: pointer;
        }
        .controls-hint {
            color: #666;
            font-size: 13px;
            margin-top: 10px;
        }
        .controls-hint kbd {
            background: #333;
            color: #4caf50;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <h1>🐍 HERMES SNAKE</h1>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="controls-hint">
            <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> or <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> &nbsp;|&nbsp; Tap to start
        </div>
    </div>

    <!-- Load game files in dependency order: simple classes first, then the main loop -->
    <script src="snake.js"></script>
    <script src="food.js"></script>
    <script src="score.js"></script>
    <script src="audio.js"></script>
    <script src="game.js"></script>
</body>
</html>
